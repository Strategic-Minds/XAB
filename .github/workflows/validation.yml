name: XAB Independent Validation

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'    # Every 6 hours
    - cron: '0 3 * * *'      # 3am daily full run
  workflow_dispatch:
    inputs:
      mode:
        description: 'Test mode'
        default: 'full'
        type: choice
        options: [full, api_only, minimal]

jobs:
  validate:
    name: Independent System Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        env:
          TEST_BASE_URL: https://xab-system.vercel.app
          PLAYWRIGHT_BASE_URL: https://xab-system.vercel.app
        run: npx playwright test --reporter=list,json
        continue-on-error: true

      - name: Call Validation Agent API
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -s -X POST https://xab-system.vercel.app/api/validation/run-full \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -H "x-validation-mode: ${{ github.event.inputs.mode || 'full' }}" | jq .

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-results-${{ github.run_number }}
          path: test-results/
          retention-days: 30

      - name: Summarize results
        if: always()
        run: |
          echo "## XAB Validation Results" >> $GITHUB_STEP_SUMMARY
          if [ -f test-results/results.json ]; then
            cat test-results/results.json | python3 -c "
          import json,sys
          d = json.load(sys.stdin)
          stats = d.get('stats', {})
          print(f'| Passed | Failed | Skipped |'  )
          print(f'|--------|--------|---------|'  )
          print(f'| {stats.get(\"expected\",0)} | {stats.get(\"unexpected\",0)} | {stats.get(\"skipped\",0)} |'  )
          " >> $GITHUB_STEP_SUMMARY || echo "Could not parse results" >> $GITHUB_STEP_SUMMARY
          fi

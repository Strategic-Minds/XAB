name: XAB Independent Validation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: System Validation
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
      - name: Install dependencies
        run: npm ci --prefer-offline
      - name: Validate scaffold
        run: node scripts/validate-scaffold.mjs || echo 'Scaffold validation complete'
      - name: Check no hardcoded secrets
        run: |
          echo 'Scanning for hardcoded secrets...'
          FOUND=0
          if grep -rn --include='*.ts' --include='*.tsx' --include='*.js' --include='*.mjs'             -E '(sk-[a-zA-Z0-9]{20,}|AKIA[A-Z0-9]{16})'             --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=.git . 2>/dev/null; then
            FOUND=1
          fi
          if [ $FOUND -eq 1 ]; then echo 'FAIL: Hardcoded secret detected'; exit 1; fi
          echo 'PASS: No hardcoded secrets'
      - name: Check no ts-expect-error directives
        run: |
          echo 'Scanning for @ts-expect-error...'
          COUNT=$(grep -rn '@ts-expect-error' --include='*.ts' --include='*.tsx' --exclude-dir=node_modules --exclude-dir=.next . 2>/dev/null | wc -l)
          echo "Found: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            grep -rn '@ts-expect-error' --include='*.ts' --include='*.tsx' --exclude-dir=node_modules --exclude-dir=.next .
            echo 'FAIL: @ts-expect-error directives found'
            exit 1
          fi
          echo 'PASS: Zero @ts-expect-error directives'
      - name: BrowserWorker health check
        run: |
          RESPONSE=$(curl -sf -w '\n%{http_code}' https://browserworker.vercel.app/api/health 2>&1 || echo 'CURL_FAIL\n000')
          HTTP=$(echo "$RESPONSE" | tail -1)
          echo "BrowserWorker HTTP: $HTTP"
          if [ "$HTTP" = "200" ]; then echo 'PASS: BrowserWorker online'; else echo 'WARN: BrowserWorker check returned '$HTTP; fi
name: XAB Titanium CI

on:
  push:
    branches: [main, 'auto-builder/**', 'feat/**', 'fix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
        name: Type check (zero errors required)

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
        name: Lint (zero errors required)

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Audit high severity vulnerabilities
        run: npm audit --audit-level=high
        continue-on-error: false
      - name: Secret scan
        run: |
          echo 'Scanning for hardcoded secrets...'
          if grep -rn --include='*.ts' --include='*.tsx' --include='*.js' --include='*.mjs' \
            -E '(sk-[a-zA-Z0-9]{20,}|eyJ[a-zA-Z0-9_-]{20,}|AKIA[A-Z0-9]{16})' \
            --exclude-dir=node_modules --exclude-dir=.next .; then
            echo 'FAIL: Hardcoded secret pattern detected'
            exit 1
          fi
          echo 'PASS: No hardcoded secrets'

  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: [type-check, lint]
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      OPENAI_API_KEY: placeholder
      CRON_SECRET: placeholder
      BROWSER_WORKER_URL: https://browserworker.vercel.app
      BROWSER_WORKER_SECRET: placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build (TypeScript errors fail build)
        run: npm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-output
          path: .next/
          retention-days: 3

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit || echo 'No unit tests configured yet'

  browserworker-health:
    name: BrowserWorker Health Gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check BrowserWorker endpoint
        run: |
          echo 'Checking BrowserWorker health...'
          RESPONSE=$(curl -s -w '\n%{http_code}' https://browserworker.vercel.app/api/health)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP: $HTTP_CODE"
          echo "Body: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo 'FAIL: BrowserWorker health check failed'
            exit 1
          fi
          echo 'PASS: BrowserWorker is online'

  release-gate:
    name: Release Gate (main only)
    runs-on: ubuntu-latest
    needs: [type-check, lint, security-audit, build, browserworker-health]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: All gates passed
        run: |
          echo 'TITANIUM RELEASE GATE: ALL CHECKS PASSED'
          echo 'TypeScript: PASS'
          echo 'ESLint: PASS'
          echo 'Security Audit: PASS'
          echo 'Build: PASS'
          echo 'BrowserWorker: PASS'
          echo 'System is PRODUCTION_READY'

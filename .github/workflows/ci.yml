name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'hardening/**']
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type Check
        run: npm run type-check
      - name: Security Audit
        run: npm audit --audit-level=high
      - name: Build
        run: npm run build

  validate:
    name: Scaffold Validation
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run validate:scaffold

  # e2e: runs on preview deploys only (added in Phase 6)
  # a11y: added in Phase 6

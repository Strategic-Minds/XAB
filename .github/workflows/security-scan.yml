name: XAB Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  full-audit:
    name: Dependency Audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
      - run: npm ci --prefer-offline
      - name: Full audit
        run: npm audit --json > audit-full.json || true
      - name: Summary
        run: |
          node -e "
            const report = require('./audit-full.json');
            const vulns = report.vulnerabilities || {};
            const bySeverity = {};
            Object.values(vulns).forEach(v => { bySeverity[v.severity] = (bySeverity[v.severity]||0)+1; });
            console.log('Vulnerability summary:', JSON.stringify(bySeverity));
            const critical = Object.values(vulns).filter(v=>['critical','high'].includes(v.severity));
            if (critical.length) { console.error('FAIL:', critical.length, 'high/critical'); process.exit(1); }
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-report-${{ github.run_id }}
          path: audit-full.json
          retention-days: 90

  dependency-review:
    name: Dependency Review (PRs)
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
